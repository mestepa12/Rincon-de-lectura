<!DOCTYPE html>
<html lang="es">
<head>
    <script>if(localStorage.getItem('rincon_logged_in')==='1'){location.replace('biblioteca.html');}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Mi Rincón de Lectura</title>
    <meta name="description" content="Crea tu cuenta gratis en Mi Rincón de Lectura: registra tus libros, mantén tu racha diaria y comparte reseñas con amigos.">
    <link rel="canonical" href="https://rinconlectura.es/register">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C3LTR2R6B5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-C3LTR2R6B5');
</script>
</head>
<body class="login-page">
<a href="index.html" class="back-to-demo">← Volver</a>
    <div class="login-container">
        <h1>Crear una Cuenta</h1>
        
        <form id="register-form"> 
            <label for="register-email">Correo Electrónico</label>
            <input type="email" id="register-email" required>

            <label for="register-username">Nombre de usuario</label>
            <input type="text" id="register-username" maxlength="30" required>

            
            <label for="register-password">Contraseña (mín. 8 caracteres, con letras y números)</label>
            <div class="password-wrapper">
                <input type="password" id="register-password" minlength="8" required>
               <button type="button" id="toggle-register-password" class="toggle-password" aria-label="Mostrar contraseña">
                   👁️
               </button>
            </div>

            <label for="register-password-confirm">Confirmar Contraseña</label>
            <div class="password-wrapper">
                <input type="password" id="register-password-confirm" required>
               <button type="button" id="toggle-register-password-confirm" class="toggle-password" aria-label="Mostrar contraseña">
                   👁️
               </button>
            </div>
            <button type="submit" class="btn-primary">Crear Cuenta</button>
            <p id="register-error" class="error-message"></p>
        </form>

        <div style="display:flex;align-items:center;gap:10px;margin:16px 0;color:#999;font-size:13px;">
            <span style="flex:1;height:1px;background:#ddd;"></span>o<span style="flex:1;height:1px;background:#ddd;"></span>
        </div>

        <button type="button" id="google-signin-btn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
            <span>Continuar con Google</span>
        </button>

        <div class="form-switcher">
            <a href="login.html">¿Ya tienes una cuenta? Inicia sesión</a>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script src="cookies.js" defer></script>
    <script type="module" src="./config.js"></script>
    
        <div id="cookie-banner" class="cookie-banner">
         <p>
             Utilizamos cookies y almacenamiento local para mejorar tu experiencia,
             guardar tus preferencias de tema y mantener tu sesión iniciada.
             Al continuar, aceptas nuestro uso de cookies.
         </p>
         <button id="accept-cookies-btn" class="btn-primary">Aceptar</button>
        </div>
    </body>
</html>
