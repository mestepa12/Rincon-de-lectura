<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Página no encontrada | Mi Rincón de Lectura</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #FDFBF7;
        --card: #FFFFFF;
        --text: #4E443A;
        --muted: #7D5C51;
        --accent: #9B3B3B;
        --border: #E0D8CC;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1A202C;
          --card: #2D3748;
          --text: #E2E8F0;
          --muted: #A0AEC0;
          --accent: #E58A8A;
          --border: #4A5568;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: 'Lato', sans-serif;
        padding: 1.5rem;
      }
      main {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        max-width: 420px;
        width: 100%;
        padding: 2.5rem 2rem 2rem;
        text-align: center;
      }
      img.mascota { width: 96px; height: auto; margin-bottom: 0.75rem; }
      p.codigo {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-indent: 0.25em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 0.4rem;
      }
      h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 1.6rem;
        margin: 0 0 0.75rem;
      }
      p.texto {
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--muted);
        margin: 0 0 1.75rem;
      }
      a.volver {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        padding: 0.8rem 1.8rem;
        border-radius: 10px;
        transition: filter 0.15s ease, transform 0.15s ease;
      }
      a.volver:active { transform: scale(0.98); }
      @media (hover: hover) and (pointer: fine) {
        a.volver:hover { filter: brightness(1.1); }
      }
    </style>
  </head>
  <body>
    <main>
      <img class="mascota" src="/mascota_racha.png" alt="" onerror="this.style.display='none'">
      <p class="codigo">Error 404</p>
      <h1>Esta página se ha perdido entre los estantes</h1>
      <p class="texto">La dirección que buscas no existe o ha cambiado de sitio. Págino tampoco la encuentra.</p>
      <a class="volver" href="/">Volver al inicio</a>
    </main>
  </body>
</html>
